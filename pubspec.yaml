name: lesfugitifs
description: Prototype Flutter (Scénario / Plan / Archives) — setState, assets, simulation GPS
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.12.3
  google_maps_flutter_android: ^2.18.4
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.2
  speech_to_text: ^7.3.0
  url_launcher: ^6.3.2
  http: ^1.2.2
  video_player: ^2.9.2

  flutter_map: any
  latlong2: any
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  device_info_plus: ^10.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/logo.png
    - assets/images/logo grid complet.png
    - assets/images/logo illuvinatis.png
    - assets/images/logo in tenebris.png